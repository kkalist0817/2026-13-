<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로드맵 상세 | 꿈조각</title>
    <link rel="stylesheet" href="../css/roadmap.css" />
  </head>
  <body>
    <header
      class="header"
      style="display: flex; justify-content: space-between; align-items: center"
    >
      <button
        class="logo-button"
        onclick="location.href = 'main.html'"
        style="
          background: none;
          border: none;
          cursor: pointer;
          text-align: left;
        "
      >
        <h1 style="margin: 0; color: #333">꿈조각</h1>
        <p style="margin: 5px 0 0 0; font-size: 12px; color: #666">
          목표를 이룬 사람들의 로드맵 거래 플랫폼
        </p>
      </button>

      <button
        onclick="location.href = 'roadmap-create.html'"
        style="
          background-color: #0f766e;
          color: white;
          border: none;
          padding: 10px 20px;
          border-radius: 8px;
          font-size: 14px;
          font-weight: bold;
          cursor: pointer;
          transition: background 0.2s;
        "
      >
        + 로드맵 만들기
      </button>
    </header>

    <main class="container">
      <button class="back-button" onclick="history.back()">← 뒤로가기</button>

      <section id="detailContainer" class="detail-card">
        <!-- detail.js에서 상세 화면을 동적으로 넣음 -->
      </section>
    </main>

    <script src="../js/detail.js"></script>
  </body>
</html>
