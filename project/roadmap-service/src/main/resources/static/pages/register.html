<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입</title>
  <link rel="stylesheet" href="../css/login.css">
</head>
<body>

  <div class="login-wrapper">
    <h2>회원가입</h2>

    <div class="login-box">
      <div class="input-area">
        <div class="input-row">
          <label for="userid">ID:</label>
          <input type="text" id="userid" placeholder="아이디를 입력하세요">
        </div>

        <div class="input-row">
          <label for="userpw">PW:</label>
          <input type="password" id="userpw" placeholder="비밀번호를 입력하세요">
        </div>

        <div class="input-row">
          <label for="userpwCheck">PW 확인:</label>
          <input type="password" id="userpwCheck" placeholder="비밀번호를 다시 입력하세요">
        </div>

        <div id="errorMessage" class="error-message">
          아이디와 비밀번호를 모두 입력해주세요.
        </div>
      </div>

      <button class="login-button" id="registerBtn">회원가입</button>

      <div style="margin-top: 16px; text-align: center;">
        <a href="../login.html" style="color: #0f766e; font-weight: bold; text-decoration: none;">
          로그인 화면으로 돌아가기
        </a>
      </div>
    </div>
  </div>

  <script src="../js/register.js"></script>
</body>
</html>
