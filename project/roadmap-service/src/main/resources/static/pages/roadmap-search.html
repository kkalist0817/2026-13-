<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로드맵 검색 | 꿈조각</title>
    <link rel="stylesheet" href="../css/roadmap.css" />
  </head>

  <body class="roadmap-search-page">
    <header class="header">
      <button class="logo-button" onclick="location.href='main.html'">
        <h1>꿈조각</h1>
        <p>목표를 이룬 사람들의 로드맵 거래 플랫폼</p>
      </button>

      <button class="create-roadmap-button" onclick="location.href='roadmap-create.html'">
        + 로드맵 만들기
      </button>
    </header>

    <main class="container">
      <section class="search-section">
        <div class="search-bar">
          <input
            id="searchInput"
            type="text"
            placeholder="예: ADsP 합격, 정보처리기사, 토익"
          />
          <button id="searchButton" class="search-button">검색</button>
        </div>
      </section>

      <section class="result-section">
        <div class="section-title">
          <h2>검색 결과</h2>
          <span id="resultCount">0개</span>
        </div>

        <div id="resultContainer" class="card-grid"></div>
      </section>
    </main>

    <script src="../js/search.js"></script>
  </body>
</html>
