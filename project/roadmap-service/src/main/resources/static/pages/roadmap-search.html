<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로드맵 검색 | 꿈조각</title>
    <link rel="stylesheet" href="../css/roadmap.css" />
  </head>
  <body>
    <header
      class="header"
      style="display: flex; justify-content: space-between; align-items: center"
    >
      <button
        class="logo-button"
        onclick="location.href = 'main.html'"
        style="
          background: none;
          border: none;
          cursor: pointer;
          text-align: left;
        "
      >
        <h1 style="margin: 0; color: #333">꿈조각</h1>
        <p style="margin: 5px 0 0 0; font-size: 12px; color: #666">
          목표를 이룬 사람들의 로드맵 거래 플랫폼
        </p>
      </button>

      <button
        onclick="location.href = 'roadmap-create.html'"
        style="
          background-color: #0f766e;
          color: white;
          border: none;
          padding: 10px 20px;
          border-radius: 8px;
          font-size: 14px;
          font-weight: bold;
          cursor: pointer;
          transition: background 0.2s;
        "
      >
        + 로드맵 만들기
      </button>
    </header>

    <main class="container">
      <section class="search-section">
        <div class="search-bar">
          <input
            id="searchInput"
            type="text"
            placeholder="예: ADsP 합격, 정보처리기사, 토익"
          />
          <button id="searchButton" class="search-button">검색</button>
        </div>
      </section>

      <section class="result-section">
        <div class="section-title">
          <h2>검색 결과</h2>
          <span id="resultCount">0개</span>
        </div>

        <div id="resultContainer" class="card-grid"></div>
      </section>
    </main>

    <script src="../js/search.js"></script>
  </body>
</html>
